{% extends 'base.html' %}
{% block content %}

<section class="section-conten padding-y" style="min-height:84vh">
    <!-- ============================ COMPONENT LOGIN   ================================= -->
    
    <div class="card mx-auto" style="max-width: 500px; margin-top:100px;">
        {% include 'includes/alerts.html' %}
        <div class="card-body">
            <h4 class="card-title mb-4">Forgot Password</h4>
            <form action="{% url 'forgotPassword' %}" method='POST'>
                {% csrf_token %}
                <div class="form-group">
                    <input type="email" name="email" class="form-control" placeholder="Email Address" >
                </div>
                
                <div class="form-group">
                    <a href="{% url 'login' %}" class="float-right">Got password? Lets login</a> 
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block"> Submit  </button>
                </div>
                
            </form>
        </div>
        <!-- card-body.// -->
    </div>

    <!-- card .// -->
    <p class="text-center mt-4">Don't have account? <a href="{%  url 'register' %}">Sign up</a></p>
    <br><br>
    <!-- ============================ COMPONENT LOGIN  END.// ================================= -->
</section>

{% endblock %}
